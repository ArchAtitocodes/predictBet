version: '3.8'

services:
  predictbet:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: predictbet_app
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY:-}
      - BETIKA_BASE_URL=${BETIKA_BASE_URL:-https://api.betika.com}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
